name: Bazel CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Bazelisk
        run: |
          curl -Lo bazelisk https://github.com/bazelbuild/bazelisk/releases/latest/download/bazelisk-linux-amd64
          chmod +x bazelisk
          sudo mv bazelisk /usr/local/bin/bazel

      - name: Cache Bazel
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/bazel
          key: bazel-${{ runner.os }}-${{ hashFiles('WORKSPACE', '.bazelversion') }}

      - name: Build all targets
        run: bazel build //...

      - name: Test all targets
        run: bazel test //...

  deploy-aws:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-southeast-1

      - name: Login to AWS ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/bazel-demo:$IMAGE_TAG ./apps/api
          docker push $ECR_REGISTRY/bazel-demo:$IMAGE_TAG
          echo "IMAGE=$ECR_REGISTRY/bazel-demo:$IMAGE_TAG" >> $GITHUB_ENV

      - name: Deploy to AWS App Runner
        run: |
          aws apprunner update-service \
            --service-arn ${{ secrets.AWS_APPRUNNER_ARN }} \
            --source-configuration "{\"ImageRepository\":{\"ImageIdentifier\":\"$IMAGE\",\"ImageRepositoryType\":\"ECR\"}}"

  deploy-gcp:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Build and push to Google Artifact Registry
        env:
          IMAGE_TAG: ${{ github.sha }}
          GCP_PROJECT: ${{ secrets.GCP_PROJECT_ID }}
          GCP_REGION: asia-southeast1
        run: |
          gcloud auth configure-docker asia-southeast1-docker.pkg.dev
          docker build -t asia-southeast1-docker.pkg.dev/$GCP_PROJECT/bazel-demo/api:$IMAGE_TAG ./apps/api
          docker push asia-southeast1-docker.pkg.dev/$GCP_PROJECT/bazel-demo/api:$IMAGE_TAG

      - name: Deploy to Google Cloud Run
        env:
          IMAGE_TAG: ${{ github.sha }}
          GCP_PROJECT: ${{ secrets.GCP_PROJECT_ID }}
          GCP_REGION: asia-southeast1
        run: |
          gcloud run deploy bazel-demo \
            --image asia-southeast1-docker.pkg.dev/$GCP_PROJECT/bazel-demo/api:$IMAGE_TAG \
            --region $GCP_REGION \
            --platform managed \
            --allow-unauthenticated
